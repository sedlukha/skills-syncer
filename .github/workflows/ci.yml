name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Match the `engines.node` floor (>=18), the LTS lines, and current.
        node: ['18', '20', '22', '24']
    name: test (node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # No dependencies to install — the tool and its tests use only Node
      # built-ins, so go straight to the suite.
      - run: npm test
